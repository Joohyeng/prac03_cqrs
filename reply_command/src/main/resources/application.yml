server:
  port: 8084

spring:
  application:
    name: reply-command
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_MASTER_URL}
    username: ${DB_MASTER_USER}
    password: ${DB_MASTER_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: 10.10.10.20:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      key-serializer: org.apache.kafka.common.serialization.LongDeserializer
      value-serializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: abcd-group-1
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false # ????? ?? ??(??? ??)? ????? ??

logging:
  level:
    com.example.reply_command: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace