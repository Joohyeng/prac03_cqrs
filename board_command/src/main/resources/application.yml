server:
  port: 8081

eureka:
  instance:
    lease-renewal-interval-in-seconds: 10     # 주소를 갱신하는 시간
    lease-expiration-duration-in-seconds: 30  # 가져온 주소의 만료 시간
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://localhost:9090/eureka
    register-with-eureka: true  # 현재 자신의 IP주소를 유레카에 등록
    fetch-registry: true        # 유레카에 등록된 주소들을 받아오는 것

spring:
  application:
    name: board-command
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_MASTER_URL}
    username: ${DB_MASTER_USER}
    password: ${DB_MASTER_PASS}

  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: 10.10.10.20:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      key-serializer: org.apache.kafka.common.serialization.LongDeserializer
      value-serializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: abcd-group-1
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false # 프로듀서가 보낸 타입(패키지 포함)을 무시하도록 설정

  logging:
    level:
      com.example.board_command: debug
      org.hibernate.SQL: debug
      org.hibernate.orm.jdbc.bind: trace